<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Calculadora Escolar Digital</title>

    <link rel="stylesheet" href="style.css">

    <link rel="manifest" href="manifest.json">

    <meta name="theme-color" content="#2563eb">
</head>

<body>

    <div class="container">

        <h1>📚 Calculadora Escolar Digital</h1>

        <label>Nome do aluno</label>
        <input type="text" id="nome" placeholder="Digite o nome do aluno">

        <label>1ª Nota</label>
        <input type="number" id="nota1" placeholder="Digite a nota">

        <label>2ª Nota</label>
        <input type="number" id="nota2" placeholder="Digite a nota">

        <label>3ª Nota</label>
        <input type="number" id="nota3" placeholder="Digite a nota">

        <label>4ª Nota</label>
        <input type="number" id="nota4" placeholder="Digite a nota">

        <button class="btn-calcular" onclick="calcularMedia()">
            Calcular Média
        </button>

        <button class="btn-nova" onclick="novaMedia()">
            Nova Média
        </button>

        <button class="btn-sobre" onclick="sobreApp()">
            Sobre o Aplicativo
        </button>

        <div class="resultado" id="resultado">

            <h2>Resultado</h2>

            <p id="nomeAluno"></p>

            <p id="mediaFinal"></p>

            <p class="status" id="situacao"></p>

        </div>

        <div class="footer">
            Desenvolvido por Rayssa Santos 💙
        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
