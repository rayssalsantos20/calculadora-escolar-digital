<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Calculadora Escolar Digital</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>



<!-- LOADING PREMIUM -->

<div id="loadingSistema" style="display:none;">

    <div class="loaderCardPremium">

        <img src="logo.png" class="logoSplash">

        <h2 class="tituloSplash">
            Calculadora Escolar Digital
        </h2>

        <p class="textoSplash">
            Carregando sistema...
        </p>

        <div class="loadingBarPremium">

            <div class="loadingProgressPremium"></div>

        </div>

    </div>

</div>





<!-- MENU PREMIUM -->

<div id="menuInicial" class="menuPremium">

    <div class="topoMenu">

        <img src="logo.png" class="logoTopo">

        <div>

            <h1>CED</h1>

            <p>Calculadora Escolar Digital</p>

        </div>

    </div>



    <img src="logo.png" class="imagemPrincipal">



    <h2>
        Controle escolar inteligente
    </h2>

    <span class="textoMenuPremium">

        Calcule e acompanhe o desempenho escolar
        de forma prática e organizada.

    </span>



    <button
        onclick="abrirCalculadora()"
        class="btnPremium"
    >

        📈 Nova média

    </button>



    <button
        onclick="mostrarSobre()"
        class="btnPremium azul"
    >

        ℹ️ Sobre o aplicativo

    </button>

</div>





<!-- APP PRINCIPAL -->

<div id="appPrincipal" style="display:none">



    <header id="headerApp">

        <button
            class="btnVoltar"
            onclick="voltarMenu()"
        >
            ⬅️
        </button>



        <button
            class="btnTema"
            onclick="alternarTema()"
        >
            🌙
        </button>

        📊 CALCULADORA ESCOLAR DIGITAL

    </header>





    <div class="container">



        <label>
            Nome do aluno
        </label>

        <input
            type="text"
            id="nome"
            placeholder="Digite o nome do aluno"
        >




        <label>
            Segmento escolar
        </label>

        <select
            id="segmento"
            onchange="atualizarDisciplinas()"
        >

            <option value="">
                Selecione
            </option>

            <option value="fund1">
                Ensino Fundamental I
            </option>

            <option value="fund2">
                Ensino Fundamental II
            </option>

            <option value="medio">
                Ensino Médio
            </option>

        </select>





        <label>
            Disciplina
        </label>

        <select id="disciplina">

            <option value="">
                Selecione
            </option>

        </select>





        <label>
            1º Bimestre
        </label>

        <input
            type="text"
            inputmode="decimal"
            id="b1"
            placeholder="Digite a nota"
        >




        <label>
            2º Bimestre
        </label>

        <input
            type="text"
            inputmode="decimal"
            id="b2"
            placeholder="Digite a nota"
        >




        <label>
            3º Bimestre
        </label>

        <input
            type="text"
            inputmode="decimal"
            id="b3"
            placeholder="Digite a nota"
        >




        <label>
            4º Bimestre
        </label>

        <input
            type="text"
            inputmode="decimal"
            id="b4"
            placeholder="Digite a nota"
        >





        <button onclick="gerarRelatorio()">

            📊 Gerar Relatório

        </button>





        <button
            id="btnPDF"
            onclick="baixarRelatorio()"
            disabled
        >

            📥 Baixar Relatório

        </button>





        <button
            class="btnLimpar"
            onclick="limparCampos()"
        >

            🧹 Limpar

        </button>





        <div id="resultado"></div>





        <div class="barra">

            <div id="barra"></div>

        </div>





        <div class="dashboard">

            <h3>
                📊 Dashboard do Desempenho
            </h3>

            <div class="graficoContainer">

                <div class="graficoItem">

                    <span>1º</span>

                    <div
                        class="coluna"
                        id="graf1"
                    ></div>

                </div>



                <div class="graficoItem">

                    <span>2º</span>

                    <div
                        class="coluna"
                        id="graf2"
                    ></div>

                </div>



                <div class="graficoItem">

                    <span>3º</span>

                    <div
                        class="coluna"
                        id="graf3"
                    ></div>

                </div>



                <div class="graficoItem">

                    <span>4º</span>

                    <div
                        class="coluna"
                        id="graf4"
                    ></div>

                </div>

            </div>

        </div>

    </div>

</div>



<script src="script.js"></script>

</body>
</html>
