<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Calculadora Escolar Digital</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>
<!-- TELA DE CARREGAMENTO -->

<div id="loading">

    <div class="loaderCard">

        <h1>📊</h1>

        <h2>Calculadora Escolar Digital</h2>

        <p>Carregando sistema...</p>

        <div class="loadingBar">

            <div class="loadingProgress"></div>

        </div>

    </div>

</div>

    <!-- MENU INICIAL -->

    <div id="menuInicial" class="menu">

        <h2>📊 Calculadora Escolar Digital</h2>

        <button onclick="abrirCalculadora()">
            Nova média
        </button>

        <button onclick="mostrarSobre()">
            Sobre o aplicativo
        </button>

    </div>



    <!-- APP PRINCIPAL -->

    <div id="appPrincipal" style="display:none">


        <!-- HEADER -->

        <header id="headerApp">

            <button class="btnVoltar" onclick="voltarMenu()">
                ⬅️
            </button>

            📊 CALCULADORA ESCOLAR DIGITAL

        </header>



        <!-- CONTAINER -->

        <div class="container">


            <!-- NOME -->

            <label for="nome">
                Nome do aluno
            </label>

            <input
                type="text"
                id="nome"
                placeholder="Digite o nome do aluno"
            >



            <!-- SEGMENTO -->

            <label for="segmento">
                Segmento escolar
            </label>

            <select
                id="segmento"
                onchange="atualizarDisciplinas()"
            >

                <option value="">
                    Selecione
                </option>

                <option value="fund1">
                    Ensino Fundamental I
                </option>

                <option value="fund2">
                    Ensino Fundamental II
                </option>

                <option value="medio">
                    Ensino Médio
                </option>

            </select>



            <!-- DISCIPLINA -->

            <label for="disciplina">
                Disciplina
            </label>

            <select id="disciplina">

                <option value="">
                    Selecione
                </option>

            </select>



            <!-- BIMESTRES -->

            <label for="b1">
                1º Bimestre
            </label>

            <input
                type="number"
                id="b1"
                min="0"
                max="10"
                step="0.1"
                placeholder="Digite a nota"
            >



            <label for="b2">
                2º Bimestre
            </label>

            <input
                type="number"
                id="b2"
                min="0"
                max="10"
                step="0.1"
                placeholder="Digite a nota"
            >



            <label for="b3">
                3º Bimestre
            </label>

            <input
                type="number"
                id="b3"
                min="0"
                max="10"
                step="0.1"
                placeholder="Digite a nota"
            >



            <label for="b4">
                4º Bimestre
            </label>

            <input
                type="number"
                id="b4"
                min="0"
                max="10"
                step="0.1"
                placeholder="Digite a nota"
            >



            <br>



            <!-- BOTÕES -->

            <button onclick="simularMedia()">
                📊 Gerar Relatório
            </button>



            <button
                id="btnPDF"
                onclick="baixarRelatorio()"
                disabled
            >
                📥 Baixar Relatório
            </button>



           <button class="btnLimpar" onclick="limparCampos()">
🧹 Limpar
</button>



            <!-- RESULTADO -->

            <div id="resultado"></div>



            <!-- BARRA -->

            <div class="barra">

                <div id="barra"></div>

            </div>


        </div>

    </div>



    <!-- SCRIPT -->

    <script src="script.js"></script>

</body>

</html>
