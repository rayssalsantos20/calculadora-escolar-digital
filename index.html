<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Calculadora Escolar Digital</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>


<!-- TELA DE CARREGAMENTO -->

<div id="loading">

    <div class="loaderCard">

        <img src="logo.png" class="logoSplash">

        <h2 class="tituloSplash">
            Calculadora Escolar Digital
        </h2>

        <p class="textoSplash">
            Preparando seu ambiente escolar...
        </p>

        <div class="loadingBar">

            <div class="loadingProgress"></div>

        </div>

    </div>

</div>




<!-- MENU INICIAL -->

<div id="menuInicial" class="menu">

    <div class="logoArea">

        <img src="logo.png" class="logo">

        <h2>Calculadora Escolar Digital</h2>

    </div>

    <button onclick="abrirCalculadora()">
        Nova média
    </button>

    <button onclick="mostrarSobre()">
        Sobre o aplicativo
    </button>

</div>



<!-- APP PRINCIPAL -->

<div id="appPrincipal" style="display:none">


    <!-- HEADER -->

    <header id="headerApp">

        <button class="btnVoltar" onclick="voltarMenu()">
            ⬅️
        </button>

        <button class="btnTema" onclick="alternarTema()">
            🌙
        </button>

        📊 CALCULADORA ESCOLAR DIGITAL

    </header>




    <!-- CONTAINER -->

    <div class="container">


        <!-- NOME -->

        <label for="nome">
            Nome do aluno
        </label>

        <input
            type="text"
            id="nome"
            placeholder="Digite o nome do aluno"
        >




        <!-- SEGMENTO -->

        <label for="segmento">
            Segmento escolar
        </label>

        <select
            id="segmento"
            onchange="atualizarDisciplinas()"
        >

            <option value="">
                Selecione
            </option>

            <option value="fund1">
                Ensino Fundamental I
            </option>

            <option value="fund2">
                Ensino Fundamental II
            </option>

            <option value="medio">
                Ensino Médio
            </option>

        </select>




        <!-- DISCIPLINA -->

        <label for="disciplina">
            Disciplina
        </label>

        <select id="disciplina">

            <option value="">
                Selecione
            </option>

        </select>




        <!-- BIMESTRES -->

        <label for="b1">
            1º Bimestre
        </label>

        <input
            type="text"
            inputmode="decimal"
            id="b1"
            placeholder="Digite a nota"
        >




        <label for="b2">
            2º Bimestre
        </label>

        <input
            type="text"
            inputmode="decimal"
            id="b2"
            placeholder="Digite a nota"
        >




        <label for="b3">
            3º Bimestre
        </label>

        <input
            type="text"
            inputmode="decimal"
            id="b3"
            placeholder="Digite a nota"
        >




        <label for="b4">
            4º Bimestre
        </label>

        <input
            type="text"
            inputmode="decimal"
            id="b4"
            placeholder="Digite a nota"
        >



        <br>




        <!-- BOTÕES -->

        <button onclick="simularMedia()">
            📊 Gerar Relatório
        </button>



        <button
            id="btnPDF"
            onclick="baixarRelatorio()"
            disabled
        >
            📥 Baixar Relatório
        </button>



        <button class="btnLimpar" onclick="limparCampos()">
            🧹 Limpar
        </button>




        <!-- RESULTADO -->

        <div id="resultado"></div>




        <!-- BARRA -->

        <div class="barra">

            <div id="barra"></div>

        </div>




        <!-- DASHBOARD -->

        <div class="dashboard">

            <h3>📊 Dashboard do Desempenho</h3>

            <div class="graficoContainer">

                <div class="graficoItem">

                    <span>1º</span>

                    <div class="coluna" id="graf1"></div>

                </div>



                <div class="graficoItem">

                    <span>2º</span>

                    <div class="coluna" id="graf2"></div>

                </div>



                <div class="graficoItem">

                    <span>3º</span>

                    <div class="coluna" id="graf3"></div>

                </div>



                <div class="graficoItem">

                    <span>4º</span>

                    <div class="coluna" id="graf4"></div>

                </div>

            </div>

        </div>

    </div>

</div>




<!-- SCRIPT -->

<script src="script.js"></script>

</body>

</html>
